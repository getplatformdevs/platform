<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Platform</title>
<link rel="icon" type="image/png" href="https://getplatform.pages.dev/justlogo.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#0a0a0a;
    --paper:#ffffff;
    --paper-dim:#f6f6f4;
    --line:#e4e4e0;
    --mid:#8c8c88;
    --soft:#b9b9b4;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html{ 
    -webkit-font-smoothing:antialiased; 
    height: 100%;
  }

  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow-y: auto;
  }

  a, button{ font-family:inherit; }

  :focus-visible{
    outline:2px solid var(--ink);
    outline-offset:3px;
  }

  /* ---------- WATERMARK ---------- */
  .watermark{
    position:absolute;
    top:50%;
    left:50%;
    width:1100px;
    height:1100px;
    pointer-events:none;
    z-index:0;
  }

  .watermark img{
    position:absolute;
    top:50%;
    left:50%;
    filter:grayscale(1);
    object-fit:contain;
  }

  .watermark img:nth-child(1){
    width:680px;
    transform:translate(-50%,-50%) rotate(-6deg);
    opacity:0.035;
  }
  .watermark img:nth-child(2){
    width:430px;
    transform:translate(-65%,-45%) rotate(10deg);
    opacity:0.05;
  }
  .watermark img:nth-child(3){
    width:260px;
    transform:translate(-30%,-58%) rotate(-16deg);
    opacity:0.06;
  }

  /* ---------- JOIN PAGE LAYOUT ---------- */
  .join-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    z-index: 10;
  }

  .join-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 440px;
    width: 100%;
    text-align: center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.04);
    position: relative;
    z-index: 1;
  }

  .join-logo {
    width: 48px;
    height: 48px;
    object-fit: contain;
    filter: grayscale(1) contrast(1.15);
    margin-bottom: 24px;
  }

  .join-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }

  .join-subtitle {
    font-weight: 500;
    font-size: 16px;
    margin-bottom: 10px;
  }

  .join-desc {
    color: var(--mid);
    font-size: 14.5px;
    line-height: 1.5;
    margin-bottom: 32px;
  }

  /* ---------- BUTTON ---------- */
  .btn {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 15px;
    padding: 12px 24px;
    border-radius: 999px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    text-decoration: none;
    border: 1px solid transparent;
    flex: 1;
  }

  .btn:active{ transform:translateY(1px) scale(0.98); }
  .btn:disabled{ opacity:0.5; cursor:not-allowed; transform:none; }

  .btn-solid {
    background: var(--ink);
    color: var(--paper);
    border: 1px solid var(--ink);
  }

  .btn-solid:hover:not(:disabled) {
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  }

  .btn-ghost {
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--line);
  }

  .btn-ghost:hover:not(:disabled){
    border-color: var(--ink);
    box-shadow: 0 1px 0 var(--ink);
  }

  .btn-row{
    display:flex;
    gap:10px;
    width:100%;
  }

  /* ---------- FORM ---------- */
  .auth-form{
    display:flex;
    flex-direction:column;
    gap:12px;
    text-align:left;
    margin-bottom:20px;
  }

  .field-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--mid);
    margin-bottom:6px;
    display:block;
  }

  .field-input{
    width:100%;
    font-family:'Inter', sans-serif;
    font-size:15px;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid var(--line);
    background:var(--paper);
    color:var(--ink);
    transition:border-color 0.15s ease;
  }

  .field-input:focus{
    outline:none;
    border-color:var(--ink);
  }

  .field-input:disabled{ background:var(--paper-dim); }

  .field-hint{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--soft);
    margin-top:6px;
  }

  .auth-error{
    display:none;
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    color:#b3261e;
    background:#fdecea;
    border:1px solid #f3c6c2;
    border-radius:8px;
    padding:10px 12px;
    margin-bottom:18px;
    text-align:left;
  }

  .mode-hint{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--soft);
    margin-top:16px;
  }
  
  .btn-logo {
    width: 18px;
    height: 18px;
    object-fit: contain;
    flex-shrink: 0;
  }

  /* ---------- DISCLAIMER ---------- */
  .disclaimer {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    color: var(--soft);
    margin-top: 24px;
  }

  /* ---------- TOASTS ---------- */

  .toast-stack{
    position:fixed;
    top:20px;
    right:20px;
    z-index:999;
    display:flex;
    flex-direction:column;
    gap:10px;
    max-width:360px;
    pointer-events:none;
  }

  .toast{
    background:#ffffff;
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 16px;
    display:flex;
    align-items:flex-start;
    gap:12px;
    box-shadow:0 20px 50px rgba(0,0,0,0.12), 0 4px 14px rgba(0,0,0,0.06);
    pointer-events:auto;
    animation:toastIn .3s cubic-bezier(.2,.9,.25,1) forwards;
  }
  .toast.leaving{ animation:toastOut .18s ease forwards; }
  @keyframes toastIn{ from{ opacity:0; transform:translateY(-8px) scale(.97); } to{ opacity:1; transform:translateY(0) scale(1); } }
  @keyframes toastOut{ to{ opacity:0; transform:translateX(30px) scale(.96); } }

  .toast-icon{
    width:22px;
    height:22px;
    border-radius:50%;
    background:#fdecea;
    color:#b3261e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    margin-top:1px;
  }
  .toast-icon svg{ width:12px; height:12px; }

  .toast-body{ flex:1; min-width:0; }
  .toast-title{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:13.5px;
    margin-bottom:2px;
  }
  .toast-msg{
    font-size:12.5px;
    line-height:1.45;
    color:var(--mid);
    word-wrap:break-word;
  }

  .toast-close{
    background:none;
    border:none;
    cursor:pointer;
    color:var(--soft);
    padding:2px;
    line-height:0;
    flex-shrink:0;
  }
  .toast-close:hover{ color:var(--ink); }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 640px) {
    .toast-stack{ left:16px; right:16px; top:16px; max-width:none; }
    .join-card {
      padding: 40px 24px;
      border: none;
      box-shadow: none;
      background: transparent;
    }
    .watermark{ width:700px; height:700px; }
  }
</style>
</head>
<body>

<script>
  // Runs first, standalone, before the Supabase CDN script. Surfaces a
  // visible popup for any crash (no dev tools needed) and disables the
  // form with a clear message if the CDN script never loads, instead of
  // the buttons silently doing nothing.
  (function(){
    var toastStack = document.createElement('div');
    toastStack.className = 'toast-stack';
    document.body.appendChild(toastStack);

    window.toast = function(message, title){
      title = title || 'Something went wrong';
      var el = document.createElement('div');
      el.className = 'toast';
      el.innerHTML =
        '<div class="toast-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 8v5M12 16.2v.01"/></svg></div>' +
        '<div class="toast-body"><div class="toast-title"></div><div class="toast-msg"></div></div>' +
        '<button class="toast-close" aria-label="Dismiss">&times;</button>';
      el.querySelector('.toast-title').textContent = title;
      el.querySelector('.toast-msg').textContent = message;
      toastStack.appendChild(el);
      var timer;
      function dismiss(){ clearTimeout(timer); el.classList.add('leaving'); setTimeout(function(){ el.remove(); }, 180); }
      el.querySelector('.toast-close').addEventListener('click', dismiss);
      timer = setTimeout(dismiss, 8000);
      el.addEventListener('mouseenter', function(){ clearTimeout(timer); });
      el.addEventListener('mouseleave', function(){ timer = setTimeout(dismiss, 3000); });
    };

    window.addEventListener('error', function(e){
      var where = e.filename ? ' (' + e.filename.split('/').pop() + ':' + e.lineno + ')' : '';
      window.toast('A script failed to run: ' + (e.message || 'unknown error') + where, 'Page error');
    });
    window.addEventListener('unhandledrejection', function(e){
      var msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason);
      window.toast('A background request failed: ' + msg, 'Page error');
    });

    // If the Supabase SDK never showed up within 6s, the CDN script was
    // blocked or failed -- tell the person plainly instead of leaving
    // Log In / Create Account looking clickable but doing nothing.
    setTimeout(function(){
      if (typeof window.PlatformAuth === 'undefined') {
        window.toast(
          "The login system didn't load. This usually means a script got blocked -- try disabling any ad/content blockers for this site, or test in a different browser.",
          'Still loading'
        );
        ['loginBtn', 'createBtn'].forEach(function(id){
          var btn = document.getElementById(id);
          if (btn) btn.disabled = true;
        });
      }
    }, 6000);
  })();
</script>

  <div class="watermark" aria-hidden="true">
    <img src="https://getplatform.pages.dev/justlogo.png" alt="">
    <img src="https://getplatform.pages.dev/justlogo.png" alt="">
    <img src="https://getplatform.pages.dev/justlogo.png" alt="">
  </div>

  <div class="join-wrapper">
    <div class="join-card">
      <img src="https://getplatform.pages.dev/justlogo.png" alt="Platform Logo" class="join-logo">
      
      <h1 class="join-title">Join Platform</h1>
      <p class="join-subtitle">Join Platform to get structured recommendations</p>
      <p class="join-desc">We organize your YouTube feed by topics like development, business, automation, and more.</p>

      <div class="auth-error" id="authError"></div>

      <form class="auth-form" id="authForm" autocomplete="on">
        <div>
          <label class="field-label" for="username">Username</label>
          <input class="field-input" type="text" id="username" name="username" placeholder="yourname" autocomplete="username" maxlength="20" />
        </div>
        <div>
          <label class="field-label" for="password">Password</label>
          <input class="field-input" type="password" id="password" name="password" placeholder="••••••••••••" autocomplete="current-password" />
          <p class="field-hint">Enter to log in · Shift + Enter to create account</p>
        </div>
      </form>

      <div class="btn-row">
        <button type="button" class="btn btn-solid" id="loginBtn">Log In</button>
        <button type="button" class="btn btn-ghost" id="createBtn">Create Account</button>
      </div>

      <p class="mode-hint" id="statusHint">&nbsp;</p>

      <p class="disclaimer">We never post on your behalf unless prompted.</p>
    </div>
  </div>

<script src="/vendor/platform-auth.js"></script>
<script>
  // --- Custom username/password + Flowery Key auth (no Supabase Auth, no email) ---
  const USERNAME_RE = /^[A-Za-z0-9_]{3,20}$/;

  // If already logged in, don't sit on the join page.
  if (PlatformAuth.getSession()) {
    window.location.href = 'https://getplatform.pages.dev/';
  }

  // toast() is already defined globally by the watchdog script right after
  // <body> -- reused here so errors still show even if this script fails.

  const form = document.getElementById('authForm');
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const createBtn = document.getElementById('createBtn');
  const errorEl = document.getElementById('authError');
  const statusHint = document.getElementById('statusHint');

  function setBusy(busy, label){
    loginBtn.disabled = busy;
    createBtn.disabled = busy;
    usernameInput.disabled = busy;
    passwordInput.disabled = busy;
    statusHint.textContent = busy ? label : '\u00A0';
  }

  function showError(msg){
    errorEl.textContent = msg;
    errorEl.style.display = msg ? 'block' : 'none';
  }

  // Note: if username and password are IDENTICAL, that's treated as a
  // Flowery Key (SDIFK) login attempt on the server -- so the normal
  // 3-20 char / letters-numbers-underscores username format is only
  // enforced when the two fields differ (i.e. an actual username+password
  // login or signup).
  function readCredentials({ forSignup } = {}){
    const username = usernameInput.value.trim();
    const password = passwordInput.value;
    const isSdifkAttempt = !forSignup && username && username === password;

    if (!isSdifkAttempt) {
      if (!USERNAME_RE.test(username)) {
        showError('Username must be 3-20 characters: letters, numbers, underscores only.');
        return null;
      }
      if (password.length < 12) {
        showError('Password must be at least 12 characters.');
        return null;
      }
    }
    showError('');
    return { username, password };
  }

  async function login(){
    const creds = readCredentials();
    if (!creds) return;
    setBusy(true, 'Logging in\u2026');
    try {
      await PlatformAuth.login(creds.username, creds.password);
      window.location.href = 'https://getplatform.pages.dev/';
    } catch (err) {
      console.error('Login failed:', err);
      const msg = /timed out/i.test(err?.message || '') ? err.message : (err.message || 'Invalid username or password.');
      showError(msg);
      toast(msg, 'Login failed');
    } finally {
      setBusy(false, '');
    }
  }

  async function createAccount(){
    const creds = readCredentials({ forSignup: true });
    if (!creds) return;
    setBusy(true, 'Creating account\u2026');
    try {
      await PlatformAuth.signup(creds.username, creds.password);
      // Land on the home page -- the Flowery Key gate (platform-auth.js)
      // will immediately take over there and block everything else until
      // the key is saved and confirmed.
      window.location.href = 'https://getplatform.pages.dev/';
    } catch (err) {
      console.error('Sign up failed:', err);
      const msg = /timed out/i.test(err?.message || '') ? err.message : (err.message || 'That username is taken, or something went wrong.');
      showError(msg);
      toast(msg, 'Sign up failed');
    } finally {
      setBusy(false, '');
    }
  }

  loginBtn.addEventListener('click', login);
  createBtn.addEventListener('click', createAccount);

  form.addEventListener('submit', (e) => e.preventDefault());

  form.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    e.preventDefault();
    if (e.shiftKey) {
      createAccount();
    } else {
      login();
    }
  });
</script>

</body>
</html>

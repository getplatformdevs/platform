<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Profile — Platform</title>
<link rel="icon" type="image/png" href="https://getplatform.pages.dev/justlogo.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#0a0a0a;
    --paper:#ffffff;
    --paper-dim:#f6f6f4;
    --line:#e4e4e0;
    --mid:#8c8c88;
    --soft:#b9b9b4;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html{ -webkit-font-smoothing:antialiased; }

  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    overflow-x:hidden;
  }

  a, button{ font-family:inherit; }

  :focus-visible{
    outline:2px solid var(--ink);
    outline-offset:3px;
  }

  /* ---------- NAV (matches index.html) ---------- */

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 32px;
    border-bottom:1px solid var(--line);
    position:relative;
    z-index:30;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:inherit;
  }

  .brand img{
    width:22px;
    height:22px;
    object-fit:contain;
    filter:grayscale(1) contrast(1.15);
  }

  .brand span{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:18px;
    letter-spacing:-0.01em;
  }

  .auth{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .btn{
    font-family:'Inter', sans-serif;
    font-weight:500;
    font-size:14px;
    padding:9px 18px;
    border-radius:999px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:8px;
    transition:transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    white-space:nowrap;
    border:1px solid transparent;
  }

  .btn:active{ transform:translateY(1px) scale(0.98); }
  .btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }

  .btn-ghost{
    background:var(--paper);
    color:var(--ink);
    border:1px solid var(--line);
  }

  .btn-ghost:hover:not(:disabled){
    border-color:var(--ink);
    box-shadow:0 1px 0 var(--ink);
  }

  .btn-solid{
    background:var(--ink);
    color:var(--paper);
    border:1px solid var(--ink);
  }

  .btn-solid:hover:not(:disabled){
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
  }

  .auth-skeleton{
    width:64px;
    height:36px;
    border-radius:999px;
    background:var(--paper-dim);
  }

  .user-menu{
    position:relative;
    display:flex;
    align-items:center;
    gap:10px;
  }

  .avatar-btn{
    width:36px;
    height:36px;
    border-radius:50%;
    padding:0;
    border:1px solid var(--line);
    background:var(--paper-dim);
    cursor:pointer;
    overflow:hidden;
    flex-shrink:0;
    transition:border-color .15s ease, box-shadow .15s ease, transform .15s ease;
  }
  .avatar-btn:hover{ border-color:var(--ink); box-shadow:0 1px 0 var(--ink); }
  .avatar-btn:active{ transform:translateY(1px) scale(0.96); }
  .avatar-btn img{ width:100%; height:100%; object-fit:cover; display:block; }

  .user-dropdown{
    position:absolute;
    top:calc(100% + 12px);
    left:0;
    min-width:190px;
    background:#ffffff;
    border:1px solid var(--line);
    border-radius:18px;
    box-shadow:0 16px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.04);
    padding:8px;
    opacity:0;
    transform:translateY(-6px) scale(0.97);
    pointer-events:none;
    transition:opacity .16s ease, transform .16s ease;
    z-index:50;
  }
  .user-dropdown.open{
    opacity:1;
    transform:translateY(0) scale(1);
    pointer-events:auto;
  }

  .dropdown-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    border-radius:12px;
    font-size:14px;
    font-weight:500;
    color:var(--ink);
    text-decoration:none;
    transition:background .12s ease;
    border:none;
    background:none;
    width:100%;
    cursor:pointer;
    text-align:left;
  }
  .dropdown-item:hover{ background:var(--paper-dim); }
  .dropdown-item svg{ width:16px; height:16px; color:var(--mid); flex-shrink:0; }

  /* ---------- PROFILE HEADER ---------- */

  .profile-wrap{
    max-width:900px;
    margin:0 auto;
    padding:64px 32px 100px;
  }

  .profile-header{
    display:flex;
    align-items:center;
    gap:32px;
  }

  /* big profile picture, upload-on-hover */
  .avatar-upload{
    position:relative;
    width:176px;
    height:176px;
    min-width:176px;
    border-radius:50%;
    overflow:hidden;
    cursor:pointer;
    border:1px solid var(--line);
    background:var(--paper-dim);
    flex-shrink:0;
    transition:box-shadow .15s ease;
  }

  .avatar-upload:hover,
  .avatar-upload:focus-visible{
    box-shadow:0 0 0 4px var(--paper-dim), 0 0 0 5px var(--line);
  }

  .avatar-upload img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .avatar-overlay{
    position:absolute;
    inset:0;
    background:rgba(10,10,10,0.55);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    transition:opacity .18s ease;
    pointer-events:none;
  }

  .avatar-upload:hover .avatar-overlay,
  .avatar-upload:focus-visible .avatar-overlay{
    opacity:1;
  }

  .avatar-overlay svg{
    width:38px;
    height:38px;
    color:#ffffff;
  }

  .avatar-upload.is-saving .avatar-overlay{
    opacity:1;
    background:rgba(10,10,10,0.68);
  }

  .avatar-spinner{
    width:26px;
    height:26px;
    border-radius:50%;
    border:2.5px solid rgba(255,255,255,0.35);
    border-top-color:#ffffff;
    animation:spin .7s linear infinite;
    display:none;
  }
  .avatar-upload.is-saving .avatar-spinner{ display:block; }
  .avatar-upload.is-saving .avatar-icon{ display:none; }

  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* skeleton shown while the profile row loads */
  .avatar-upload.is-loading::after{
    content:"";
    position:absolute;
    inset:0;
    transform:translateX(-100%);
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.85), transparent);
    animation:shimmer 2.2s infinite;
  }
  @keyframes shimmer{ 100%{ transform:translateX(100%); } }

  .identity{
    display:flex;
    flex-direction:column;
    gap:10px;
    min-width:0;
  }

  .handle-row{
    display:flex;
    align-items:center;
    gap:10px;
  }

  /* handle: bold black Segoe UI, per spec */
  .handle{
    font-family:'Segoe UI', 'Segoe UI Variable', -apple-system, Roboto, ui-sans-serif, sans-serif;
    font-weight:800;
    font-size:34px;
    line-height:1.1;
    color:#000000;
    letter-spacing:-0.01em;
    max-width:420px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .handle.is-loading{
    width:180px;
    height:28px;
    border-radius:7px;
    background:var(--paper-dim);
    position:relative;
    overflow:hidden;
  }
  .handle.is-loading::after{
    content:"";
    position:absolute;
    inset:0;
    transform:translateX(-100%);
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
    animation:shimmer 2.2s infinite;
  }

  .pencil-btn{
    width:34px;
    height:34px;
    min-width:34px;
    border-radius:50%;
    border:1px solid var(--line);
    background:var(--paper);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--mid);
    cursor:pointer;
    transition:border-color .15s ease, box-shadow .15s ease, color .15s ease, transform .15s ease;
  }
  .pencil-btn:hover{ border-color:var(--ink); color:var(--ink); box-shadow:0 1px 0 var(--ink); }
  .pencil-btn:active{ transform:translateY(1px) scale(0.94); }
  .pencil-btn svg{ width:15px; height:15px; }

  .member-since{
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    color:var(--mid);
  }

  .profile-note{
    font-size:13px;
    color:var(--mid);
    line-height:1.5;
    margin-top:14px;
    max-width:420px;
  }
  .profile-note a{ color:var(--ink); text-decoration:underline; }

  @media (max-width:640px){
    .profile-header{ flex-direction:column; align-items:flex-start; gap:20px; }
    .avatar-upload{ width:140px; height:140px; min-width:140px; }
    .handle{ font-size:26px; max-width:80vw; }
  }

  /* ---------- USERNAME EDIT MODAL (custom, not window.prompt) ---------- */

  .un-backdrop{
    position:fixed;
    inset:0;
    background:rgba(255,255,255,0.72);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:200;
    padding:20px;
    opacity:0;
    animation:unFadeIn .2s ease forwards;
  }
  @keyframes unFadeIn{ to{ opacity:1; } }

  .un-card{
    background:#ffffff;
    width:100%;
    max-width:380px;
    border-radius:28px;
    padding:32px 28px 28px;
    text-align:left;
    box-shadow:0 30px 70px rgba(0,0,0,0.14), 0 4px 16px rgba(0,0,0,0.05);
    border:1px solid var(--line);
    transform:translateY(10px) scale(0.98);
    animation:unPop .25s cubic-bezier(.2,.9,.25,1) forwards;
    position:relative;
  }
  @keyframes unPop{ to{ transform:translateY(0) scale(1); } }

  .un-close{
    position:absolute;
    top:16px;
    right:16px;
    width:28px;
    height:28px;
    border-radius:50%;
    border:none;
    background:var(--paper-dim);
    color:var(--mid);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:color .15s ease, background .15s ease;
  }
  .un-close:hover{ color:var(--ink); background:var(--line); }
  .un-close svg{ width:13px; height:13px; }

  .un-title{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:19px;
    letter-spacing:-0.01em;
    margin-bottom:6px;
  }
  .un-desc{
    color:var(--mid);
    font-size:13.5px;
    line-height:1.5;
    margin-bottom:20px;
  }

  .un-input-row{
    display:flex;
    align-items:center;
    border:1.5px solid var(--line);
    border-radius:14px;
    background:var(--paper-dim);
    padding:0 16px;
    transition:border-color .15s ease, background .15s ease;
    margin-bottom:8px;
  }
  .un-input-row:focus-within{
    border-color:var(--ink);
    background:var(--paper);
  }
  .un-at{
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:16px;
    color:var(--soft);
    padding-right:2px;
  }
  .un-input{
    flex:1;
    min-width:0;
    border:none;
    background:none;
    outline:none;
    font-family:'Inter', sans-serif;
    font-size:16px;
    padding:14px 0 14px 4px;
    color:var(--ink);
  }
  .un-input::placeholder{ color:var(--soft); }

  .un-error{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:#b3261e;
    min-height:16px;
    margin-bottom:14px;
  }

  .un-actions{
    display:flex;
    gap:10px;
  }
  .un-btn{
    font-family:'Inter', sans-serif;
    font-weight:500;
    font-size:14.5px;
    padding:12px 18px;
    border-radius:14px;
    cursor:pointer;
    border:1px solid transparent;
    transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    flex:1;
  }
  .un-btn:active{ transform:translateY(1px) scale(0.98); }
  .un-btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
  .un-btn-solid{ background:var(--ink); color:var(--paper); }
  .un-btn-solid:hover:not(:disabled){ box-shadow:0 6px 18px rgba(0,0,0,0.22); }
  .un-btn-ghost{ background:var(--paper); color:var(--ink); border:1px solid var(--line); }
  .un-btn-ghost:hover:not(:disabled){ border-color:var(--ink); }

  /* ---------- TOASTS ---------- */

  .toast-stack{
    position:fixed;
    top:20px;
    right:20px;
    z-index:999;
    display:flex;
    flex-direction:column;
    gap:10px;
    max-width:360px;
    pointer-events:none;
  }

  .toast{
    background:#ffffff;
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 16px;
    display:flex;
    align-items:flex-start;
    gap:12px;
    box-shadow:0 20px 50px rgba(0,0,0,0.12), 0 4px 14px rgba(0,0,0,0.06);
    pointer-events:auto;
    animation:toastIn .3s cubic-bezier(.2,.9,.25,1) forwards;
  }
  .toast.leaving{ animation:toastOut .18s ease forwards; }
  @keyframes toastIn{ from{ opacity:0; transform:translateY(-8px) scale(.97); } to{ opacity:1; transform:translateY(0) scale(1); } }
  @keyframes toastOut{ to{ opacity:0; transform:translateX(30px) scale(.96); } }

  .toast-icon{
    width:22px;
    height:22px;
    border-radius:50%;
    background:#fdecea;
    color:#b3261e;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    margin-top:1px;
  }
  .toast-icon.ok{ background:#e9f7ee; color:#1e8e3e; }
  .toast-icon svg{ width:12px; height:12px; }

  .toast-body{ flex:1; min-width:0; }
  .toast-title{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:13.5px;
    margin-bottom:2px;
  }
  .toast-msg{
    font-size:12.5px;
    line-height:1.45;
    color:var(--mid);
    word-wrap:break-word;
  }

  .toast-close{
    background:none;
    border:none;
    cursor:pointer;
    color:var(--soft);
    padding:2px;
    line-height:0;
    flex-shrink:0;
  }
  .toast-close:hover{ color:var(--ink); }

  @media (max-width:640px){
    .toast-stack{ left:16px; right:16px; top:16px; max-width:none; }
  }
</style>
</head>
<body>

<header>
  <a class="brand" href="https://getplatform.pages.dev/">
    <img src="https://getplatform.pages.dev/justlogo.png" alt="">
    <span>Platform</span>
  </a>
  <div class="auth" id="authArea">
    <div class="auth-skeleton"></div>
  </div>
</header>

<script>
  // Runs first, standalone -- same watchdog pattern as index.html so a
  // blocked CDN script fails visibly instead of leaving the page inert.
  (function(){
    var toastStack = document.createElement('div');
    toastStack.className = 'toast-stack';
    document.body.appendChild(toastStack);

    window.toast = function(message, title, kind){
      title = title || 'Something went wrong';
      var el = document.createElement('div');
      el.className = 'toast';
      var ok = kind === 'ok';
      el.innerHTML =
        '<div class="toast-icon' + (ok ? ' ok' : '') + '">' +
          (ok
            ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4 10-10"/></svg>'
            : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 8v5M12 16.2v.01"/></svg>') +
        '</div>' +
        '<div class="toast-body"><div class="toast-title"></div><div class="toast-msg"></div></div>' +
        '<button class="toast-close" aria-label="Dismiss">&times;</button>';
      el.querySelector('.toast-title').textContent = title;
      el.querySelector('.toast-msg').textContent = message;
      toastStack.appendChild(el);
      var timer;
      function dismiss(){ clearTimeout(timer); el.classList.add('leaving'); setTimeout(function(){ el.remove(); }, 180); }
      el.querySelector('.toast-close').addEventListener('click', dismiss);
      timer = setTimeout(dismiss, 8000);
      el.addEventListener('mouseenter', function(){ clearTimeout(timer); });
      el.addEventListener('mouseleave', function(){ timer = setTimeout(dismiss, 3000); });
    };

    window.addEventListener('error', function(e){
      var where = e.filename ? ' (' + e.filename.split('/').pop() + ':' + e.lineno + ')' : '';
      window.toast('A script failed to run: ' + (e.message || 'unknown error') + where, 'Page error');
    });
    window.addEventListener('unhandledrejection', function(e){
      var msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason);
      window.toast('A background request failed: ' + msg, 'Page error');
    });

    setTimeout(function(){
      var authArea = document.getElementById('authArea');
      var scriptNeverRan = typeof window.PlatformAuth === 'undefined';
      if (authArea && authArea.querySelector('.auth-skeleton') && scriptNeverRan) {
        window.toast(
          "The account system didn't finish loading in time. This usually means a script got blocked -- try disabling any ad/content blockers for this site, or test in a different browser.",
          'Still loading'
        );
      }
    }, 6000);
  })();
</script>

<main class="profile-wrap">
  <div class="profile-header">
    <div class="avatar-upload" id="avatarUpload" aria-hidden="true">
      <img id="avatarImg" alt="Profile picture">
    </div>

    <div class="identity">
      <div class="handle-row">
        <span class="handle is-loading" id="handleText"></span>
      </div>
      <span class="member-since" id="memberSince"></span>
      <p class="profile-note">Profile pictures and username changes aren't available yet on the new single-table account system. Head to <a href="https://getplatform.pages.dev/settings">Settings</a> to manage your password and Flowery Key.</p>
    </div>
  </div>
</main>

<div id="modalRoot"></div>


<script src="/vendor/platform-auth.js"></script>
<script>
  // --- Custom username/password + Flowery Key auth (no Supabase Auth, no email) ---

  const DEFAULT_AVATAR = 'data:image/svg+xml;utf8,' + encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#f6f6f4"/>
      <circle cx="50" cy="38" r="18" fill="#b9b9b4"/>
      <path d="M50 60c-22 0-36 12-36 28v6h72v-6c0-16-14-28-36-28z" fill="#b9b9b4"/>
    </svg>`
  );

  const authArea = document.getElementById('authArea');
  const avatarImg = document.getElementById('avatarImg');
  const handleText = document.getElementById('handleText');
  const memberSince = document.getElementById('memberSince');

  const session = PlatformAuth.getSession();
  if (!session) {
    window.location.href = 'https://getplatform.pages.dev/join';
  }

  PlatformAuth.renderHeader(authArea);

  avatarImg.src = DEFAULT_AVATAR;
  handleText.classList.remove('is-loading');
  handleText.textContent = '@' + session.username;

  if (session.created_at) {
    const d = new Date(session.created_at);
    memberSince.textContent = 'Member since ' + d.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
  }

  // Blocks the whole page until a still-owed Flowery Key confirmation is done.
  PlatformAuth.enforceFirstTimeGate();
</script>

</body>
</html>

name: Sync creator videos

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 min (GitHub won't guarantee exact timing, expect some drift)
  workflow_dispatch: {}       # lets you trigger it manually from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Ping cron-sync-all
        run: |
          curl -sf -X POST "$SUPABASE_FUNCTION_URL" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d '{}'
        env:
          SUPABASE_FUNCTION_URL: ${{ secrets.SUPABASE_FUNCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

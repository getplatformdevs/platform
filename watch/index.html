<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch — Platform</title>
<link rel="icon" type="image/png" href="/justlogo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a0a0a;
    --paper:#ffffff;
    --paper-dim:#f6f6f4;
    --line:#e4e4e0;
    --mid:#8c8c88;
    --soft:#b9b9b4;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ -webkit-font-smoothing:antialiased; max-width:100%; overflow-x:hidden; }
  body{ background:var(--paper); color:var(--ink); font-family:'Inter', sans-serif; overflow-x:hidden; }
  a, button{ font-family:inherit; }
  :focus-visible{ outline:2px solid var(--ink); outline-offset:3px; }

  header{ display:flex; align-items:center; justify-content:space-between; padding:20px 32px; border-bottom:1px solid var(--line); position:relative; z-index:30; }
  .brand{ display:flex; align-items:center; gap:10px; text-decoration:none; color:inherit; }
  .brand img{ width:22px; height:22px; object-fit:contain; filter:grayscale(1) contrast(1.15); }
  .brand span{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:18px; letter-spacing:-0.01em; }
  .auth{ display:flex; align-items:center; gap:10px; }
  .btn{ font-family:'Inter', sans-serif; font-weight:500; font-size:14px; padding:9px 18px; border-radius:999px; cursor:pointer; display:inline-flex; align-items:center; gap:8px; transition:transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease; white-space:nowrap; border:1px solid transparent; }
  .btn:active{ transform:translateY(1px) scale(0.98); }
  .btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
  .btn-ghost{ background:var(--paper); color:var(--ink); border:1px solid var(--line); }
  .btn-ghost:hover:not(:disabled){ border-color:var(--ink); box-shadow:0 1px 0 var(--ink); }
  .btn-solid{ background:var(--ink); color:var(--paper); border:1px solid var(--ink); }
  .btn-solid:hover:not(:disabled){ box-shadow:0 4px 14px rgba(0,0,0,0.25); }
  .auth-skeleton{ width:64px; height:36px; border-radius:999px; background:var(--paper-dim); }

  .user-menu{ position:relative; display:flex; align-items:center; gap:10px; }
  .avatar-btn{ width:36px; height:36px; border-radius:50%; padding:0; border:1px solid var(--line); background:var(--paper-dim); cursor:pointer; overflow:hidden; flex-shrink:0; transition:border-color .15s ease, box-shadow .15s ease, transform .15s ease; }
  .avatar-btn:hover{ border-color:var(--ink); box-shadow:0 1px 0 var(--ink); }
  .avatar-btn:active{ transform:translateY(1px) scale(0.96); }
  .avatar-btn img{ width:100%; height:100%; object-fit:cover; display:block; }
  .user-dropdown{ position:absolute; top:calc(100% + 12px); right:0; min-width:190px; max-width:calc(100vw - 32px); background:#ffffff; border:1px solid var(--line); border-radius:18px; box-shadow:0 16px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.04); padding:8px; opacity:0; transform:translateY(-6px) scale(0.97); pointer-events:none; transition:opacity .16s ease, transform .16s ease; z-index:50; }
  .user-dropdown.open{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
  .dropdown-item{ display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:12px; font-size:14px; font-weight:500; color:var(--ink); text-decoration:none; transition:background .12s ease; border:none; background:none; width:100%; cursor:pointer; text-align:left; }
  .dropdown-item:hover{ background:var(--paper-dim); }
  .dropdown-item svg{ width:16px; height:16px; color:var(--mid); flex-shrink:0; }

  /* ---------- shared skeleton pieces ---------- */
  .sk{ background:var(--paper-dim); position:relative; overflow:hidden; }
  .sk::after{ content:""; position:absolute; inset:0; transform:translateX(-100%); background:linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent); animation:shimmer 2.2s infinite; }
  .sk.frozen::after{ animation:none; }
  @keyframes shimmer{ 100%{ transform:translateX(100%); } }

  /* ---------- watch layout ---------- */
  .watch-wrap{ max-width:1400px; margin:0 auto; padding:40px 32px 100px; }
  .watch-grid{ display:grid; grid-template-columns:minmax(0,1fr) 360px; gap:32px; align-items:start; }

  .vplayer{ position:relative; width:100%; aspect-ratio:16/9; border-radius:12px; overflow:hidden; background:#000; border:1px solid var(--line); touch-action:none; user-select:none; -webkit-user-select:none; }
  .vplayer iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; display:block; }
  .vplayer.sk{ background:var(--paper-dim); }

  /* ================= custom player ================= */
  .vplayer-inner{ position:absolute; inset:0; }
  .vplayer-mount{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  .vplayer-mount iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; display:block; pointer-events:none; }

  .vplayer-hit{ position:absolute; inset:0; display:flex; z-index:2; cursor:pointer; }
  .vplayer-hit-zone{ flex:1; height:100%; }

  .vplayer-seekflash{ position:absolute; top:50%; width:84px; height:84px; margin-top:-42px; border-radius:50%; background:rgba(0,0,0,.55); backdrop-filter:blur(4px); color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:13px; opacity:0; pointer-events:none; transition:opacity .18s ease; z-index:3; }
  .vplayer-seekflash svg{ width:20px; height:20px; }
  .vplayer-seekflash.left{ left:10%; }
  .vplayer-seekflash.right{ right:10%; }
  .vplayer-seekflash.show{ opacity:1; }

  .vplayer-center-btn{ position:absolute; top:50%; left:50%; width:64px; height:64px; margin:-32px 0 0 -32px; border-radius:50%; background:rgba(0,0,0,.5); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; color:#fff; opacity:0; pointer-events:none; transition:opacity .16s ease, transform .16s ease; z-index:3; }
  .vplayer-center-btn svg{ width:26px; height:26px; }
  .vplayer-center-btn.show{ opacity:1; }
  .vplayer-center-btn.pulse{ opacity:1; animation:centerPulse .55s ease forwards; }
  @keyframes centerPulse{ 0%{ opacity:1; transform:scale(1); } 100%{ opacity:0; transform:scale(1.35); } }

  /* start cover -- sits over the iframe at its exact size/position, shows a
     single big play button, and takes over the very first click so users
     aren't stuck double-tapping to get playback going */
  .vplayer-startcover{ position:absolute; inset:0; z-index:6; display:flex; align-items:center; justify-content:center; cursor:pointer; background:transparent; }
  .vplayer-startcover.hide{ display:none; }
  .vplayer-startcover-btn{ width:84px; height:84px; border-radius:50%; background:rgba(0,0,0,.55); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; color:#fff; transition:transform .15s ease, background .15s ease; }
  .vplayer-startcover-btn svg{ width:32px; height:32px; margin-left:4px; }
  .vplayer-startcover:hover .vplayer-startcover-btn{ background:rgba(0,0,0,.7); transform:scale(1.06); }
  @media (pointer:coarse){ .vplayer-startcover-btn{ width:72px; height:72px; } .vplayer-startcover-btn svg{ width:28px; height:28px; } }

  .vplayer-controls{ position:absolute; left:0; right:0; bottom:0; z-index:4; padding:22px 14px 10px; background:linear-gradient(to top, rgba(0,0,0,.72), rgba(0,0,0,.35) 55%, transparent 100%); opacity:0; transform:translateY(6px); pointer-events:none; transition:opacity .18s ease, transform .18s ease; }
  .vplayer-controls.show{ opacity:1; transform:translateY(0); pointer-events:auto; }
  .vplayer.paused .vplayer-controls{ opacity:1; transform:translateY(0); pointer-events:auto; }
  .vplayer.paused.overlay-force-hidden .vplayer-controls{ opacity:0; transform:translateY(6px); pointer-events:none; }

  .vprogress-row{ padding:0 2px 8px; }
  .vprogress{ position:relative; height:14px; display:flex; align-items:center; cursor:pointer; }
  .vprogress-track{ position:absolute; left:0; right:0; height:3px; border-radius:2px; background:rgba(255,255,255,.28); transition:height .1s ease; }
  .vprogress:hover .vprogress-track, .vprogress.dragging .vprogress-track{ height:5px; }
  .vprogress-played{ position:absolute; left:0; top:0; bottom:0; width:0%; border-radius:2px; background:#fff; }
  .vprogress-handle{ position:absolute; top:50%; width:12px; height:12px; margin-top:-6px; margin-left:-6px; border-radius:50%; background:#fff; box-shadow:0 1px 4px rgba(0,0,0,.4); left:0%; transform:scale(0); transition:transform .12s ease; }
  .vprogress:hover .vprogress-handle, .vprogress.dragging .vprogress-handle{ transform:scale(1); }

  .vcontrols-row{ display:flex; align-items:center; justify-content:space-between; gap:6px; }
  .vcontrols-left, .vcontrols-right{ display:flex; align-items:center; gap:2px; min-width:0; }

  .vctl-btn{ width:36px; height:36px; border-radius:8px; border:none; background:transparent; color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:background .12s ease, opacity .12s ease; }
  .vctl-btn:hover{ background:rgba(255,255,255,.14); }
  .vctl-btn:active{ transform:scale(0.94); }
  .vctl-btn svg{ width:19px; height:19px; }

  .vvolume-wrap{ display:flex; align-items:center; }
  .vvolume-slider{ width:0; opacity:0; -webkit-appearance:none; appearance:none; height:3px; border-radius:2px; background:rgba(255,255,255,.3); outline:none; cursor:pointer; transition:width .16s ease, opacity .16s ease, margin .16s ease; margin-left:0; }
  .vvolume-wrap:hover .vvolume-slider, .vvolume-wrap.active .vvolume-slider{ width:64px; opacity:1; margin-left:4px; }
  .vvolume-slider::-webkit-slider-thumb{ -webkit-appearance:none; width:11px; height:11px; border-radius:50%; background:#fff; cursor:pointer; }
  .vvolume-slider::-moz-range-thumb{ width:11px; height:11px; border-radius:50%; background:#fff; border:none; cursor:pointer; }
  .vvolume-slider::-webkit-slider-runnable-track{ height:3px; border-radius:2px; background:rgba(255,255,255,.3); }

  .vtime{ font-family:'IBM Plex Mono', monospace; font-size:11.5px; color:#fff; opacity:.92; white-space:nowrap; padding:0 4px 0 6px; letter-spacing:-0.01em; }

  .vspeed-wrap{ position:relative; }
  .vspeed-btn{ width:auto; padding:0 9px; font-family:'IBM Plex Mono', monospace; font-size:12px; font-weight:500; }
  .vspeed-menu{ position:absolute; bottom:calc(100% + 8px); right:0; background:rgba(24,24,24,.95); backdrop-filter:blur(10px); border-radius:12px; padding:6px; display:flex; flex-direction:column; gap:1px; min-width:72px; opacity:0; transform:translateY(4px) scale(.97); pointer-events:none; transition:opacity .14s ease, transform .14s ease; box-shadow:0 12px 30px rgba(0,0,0,.35); }
  .vspeed-menu.open{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
  .vspeed-item{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:#fff; background:none; border:none; padding:7px 10px; border-radius:7px; text-align:left; cursor:pointer; display:flex; align-items:center; justify-content:space-between; }
  .vspeed-item:hover{ background:rgba(255,255,255,.12); }
  .vspeed-item.active{ color:#fff; font-weight:600; }
  .vspeed-item.active::after{ content:""; width:5px; height:5px; border-radius:50%; background:#fff; }

  /* -------- custom fullscreen -------- */
  .vplayer-fs-close{ display:none; position:fixed; top:18px; right:18px; width:40px; height:40px; border-radius:50%; background:rgba(0,0,0,.5); backdrop-filter:blur(8px); color:#fff; align-items:center; justify-content:center; cursor:pointer; z-index:10001; border:1px solid rgba(255,255,255,.14); transition:background .12s ease, transform .12s ease; }
  .vplayer-fs-close:hover{ background:rgba(0,0,0,.7); }
  .vplayer-fs-close:active{ transform:scale(0.92); }
  .vplayer-fs-close svg{ width:18px; height:18px; }

  body.vfs-lock{ overflow:hidden; height:100vh; }

  .vplayer.is-fullscreen{ position:fixed !important; inset:0 !important; width:100vw !important; height:100vh !important; max-width:none; aspect-ratio:unset; border-radius:0; border:0; z-index:9999; background:#000; }
  .vplayer.is-fullscreen .vplayer-fs-close{ display:flex; }
  .vplayer.is-fullscreen .vplayer-inner{ position:absolute; inset:0; }

  /* portrait fullscreen -> floating square, transparent surroundings */
  .vplayer.is-fullscreen.is-portrait{ background:transparent; backdrop-filter:blur(28px) saturate(1.1); -webkit-backdrop-filter:blur(28px) saturate(1.1); }
  .vplayer.is-fullscreen.is-portrait .vplayer-inner{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:min(92vw, 92vh); height:min(92vw, 92vh);
    border-radius:18px; overflow:hidden; box-shadow:0 24px 70px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.08);
  }

  /* the 404 lives ONLY inside the player box -- nothing else on the page
     changes when a video isn't found. */
  .vplayer-404{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; background:var(--paper-dim); text-align:center; padding:24px; }
  .vplayer-404-icon{ width:44px; height:44px; border-radius:50%; background:var(--paper); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; }
  .vplayer-404-icon svg{ width:20px; height:20px; color:var(--soft); }
  .vplayer-404-title{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:15px; color:var(--ink); }
  .vplayer-404-sub{ font-size:12.5px; color:var(--mid); max-width:280px; line-height:1.5; }

  .vinfo{ display:flex; flex-direction:column; gap:14px; margin-top:16px; min-width:0; }
  .vtitle-main{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:19px; line-height:1.35; }
  .vtitle-main.sk{ height:20px; width:70%; border-radius:6px; }
  .vtitle-main.sk::after{ border-radius:6px; }

  .vaction-bar{ display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; padding-bottom:16px; border-bottom:1px solid var(--line); }

  .vchannel{ display:flex; align-items:center; gap:11px; min-width:0; text-decoration:none; color:inherit; }
  .vchannel-avatar{ width:40px; height:40px; border-radius:50%; object-fit:cover; flex-shrink:0; background:var(--paper-dim); border:1px solid var(--line); }
  .vchannel-avatar.sk{ border:none; }
  .vchannel-meta{ display:flex; flex-direction:column; gap:6px; min-width:0; }
  .vchannel-name{ font-size:14.5px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:220px; }
  .vchannel-handle{ font-family:'IBM Plex Mono', monospace; font-size:11.5px; color:var(--mid); }
  .vchannel-line-sk{ height:10px; border-radius:5px; }
  .vchannel-line-sk.name{ width:120px; }
  .vchannel-line-sk.handle{ width:76px; height:8px; }

  .vaction-right{ display:flex; align-items:center; gap:10px; }

  .vfollow-btn{ font-family:'Inter', sans-serif; font-weight:500; font-size:14px; padding:9px 18px; border-radius:999px; cursor:pointer; border:1px solid var(--ink); background:var(--ink); color:#fff; transition:transform .15s ease, background .15s ease, color .15s ease, border-color .15s ease; white-space:nowrap; }
  .vfollow-btn:active{ transform:scale(0.96); }
  .vfollow-btn.is-following{ background:var(--paper); color:var(--ink); border-color:var(--line); }
  .vfollow-btn.is-following:hover{ border-color:#b3261e; color:#b3261e; }
  .vfollow-btn:disabled{ opacity:.6; cursor:not-allowed; }

  .voverlay-toggle-btn{ margin-left:18px; }

  .vreact-pill{ display:flex; align-items:center; background:var(--paper-dim); border-radius:999px; overflow:hidden; flex-shrink:0; transition:opacity .15s ease; }
  .vreact-pill.disabled{ opacity:.45; pointer-events:none; }
  .vreact-btn{ position:relative; display:flex; align-items:center; gap:6px; font-family:'Inter', sans-serif; font-weight:600; font-size:13px; color:var(--ink); background:none; border:none; padding:10px 16px; cursor:pointer; transition:background .15s ease, color .15s ease; }
  .vreact-btn:hover:not(:disabled){ background:var(--line); }
  .vreact-btn:first-child{ border-right:1px solid var(--line); }
  .vreact-btn svg{ width:16px; height:16px; }
  .vreact-btn.active{ color:#0a5fd9; }
  .vreact-btn.active.dislike{ color:#b3261e; }
  .vreact-btn:disabled{ cursor:not-allowed; }

  /* recommended rail -- skeleton only, YouTube-sidebar style: horizontal
     thumb + text instead of the homepage's stacked cards. */
  .watch-side{ display:flex; flex-direction:column; gap:14px; }
  .side-card-sk{ display:flex; gap:10px; }
  .side-thumb-sk{ width:168px; min-width:168px; aspect-ratio:16/9; border-radius:8px; }
  .side-lines-sk{ flex:1; display:flex; flex-direction:column; gap:7px; padding-top:2px; min-width:0; }
  .side-line-sk{ height:9px; border-radius:5px; }
  .side-line-sk.w90{ width:92%; }
  .side-line-sk.w60{ width:58%; }
  .side-line-sk.w40{ width:42%; }

  @media (max-width:960px){
    .watch-grid{ grid-template-columns:1fr; }
    .watch-side{ flex-direction:row; overflow-x:auto; padding-bottom:4px; }
    .side-card-sk{ flex-direction:column; min-width:200px; }
    .side-thumb-sk{ width:100%; min-width:0; }
  }
  @media (max-width:640px){
    header{ flex-wrap:wrap; row-gap:12px; }
    .auth{ width:100%; justify-content:flex-end; }
    .watch-wrap{ padding:24px 16px 80px; }
  }

  /* touch devices: bigger tap targets, volume slider always visible when
     touched (no hover), controls a bit larger for thumbs */
  @media (pointer:coarse){
    .vctl-btn{ width:42px; height:42px; }
    .vctl-btn svg{ width:21px; height:21px; }
    .vprogress{ height:22px; }
    .vprogress-handle{ transform:scale(1); }
    .vvolume-wrap .vvolume-slider{ display:none; }
    .vplayer-controls{ padding-bottom:14px; }
  }

  .toast-stack{ position:fixed; top:20px; right:20px; z-index:999; display:flex; flex-direction:column; gap:10px; max-width:360px; pointer-events:none; }
  .toast{ background:#ffffff; border:1px solid var(--line); border-radius:14px; padding:14px 16px; display:flex; align-items:flex-start; gap:12px; box-shadow:0 20px 50px rgba(0,0,0,0.12), 0 4px 14px rgba(0,0,0,0.06); pointer-events:auto; animation:toastIn .3s cubic-bezier(.2,.9,.25,1) forwards; }
  .toast.leaving{ animation:toastOut .18s ease forwards; }
  @keyframes toastIn{ from{ opacity:0; transform:translateY(-8px) scale(.97); } to{ opacity:1; transform:translateY(0) scale(1); } }
  @keyframes toastOut{ to{ opacity:0; transform:translateX(30px) scale(.96); } }
  .toast-icon{ width:22px; height:22px; border-radius:50%; background:#fdecea; color:#b3261e; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
  .toast-icon.ok{ background:#e9f7ee; color:#1e8e3e; }
  .toast-icon svg{ width:12px; height:12px; }
  .toast-body{ flex:1; min-width:0; }
  .toast-title{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:13.5px; margin-bottom:2px; }
  .toast-msg{ font-size:12.5px; line-height:1.45; color:var(--mid); word-wrap:break-word; }
  .toast-close{ background:none; border:none; cursor:pointer; color:var(--soft); padding:2px; line-height:0; flex-shrink:0; }
  .toast-close:hover{ color:var(--ink); }
  @media (max-width:640px){ .toast-stack{ left:16px; right:16px; top:16px; max-width:none; } }
</style>
</head>
<body>

<header>
  <a class="brand" href="/">
    <img src="/justlogo.png" alt="">
    <span>Platform</span>
  </a>
  <div class="auth" id="authArea">
    <div class="auth-skeleton"></div>
  </div>
</header>

<script>
  (function(){
    var toastStack = document.createElement('div');
    toastStack.className = 'toast-stack';
    document.body.appendChild(toastStack);

    window.toast = function(message, title, kind){
      title = title || 'Something went wrong';
      var el = document.createElement('div');
      el.className = 'toast';
      var ok = kind === 'ok';
      el.innerHTML =
        '<div class="toast-icon' + (ok ? ' ok' : '') + '">' +
          (ok
            ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4 10-10"/></svg>'
            : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 8v5M12 16.2v.01"/></svg>') +
        '</div>' +
        '<div class="toast-body"><div class="toast-title"></div><div class="toast-msg"></div></div>' +
        '<button class="toast-close" aria-label="Dismiss">&times;</button>';
      el.querySelector('.toast-title').textContent = title;
      el.querySelector('.toast-msg').textContent = message;
      toastStack.appendChild(el);
      var timer;
      function dismiss(){ clearTimeout(timer); el.classList.add('leaving'); setTimeout(function(){ el.remove(); }, 180); }
      el.querySelector('.toast-close').addEventListener('click', dismiss);
      timer = setTimeout(dismiss, 8000);
      el.addEventListener('mouseenter', function(){ clearTimeout(timer); });
      el.addEventListener('mouseleave', function(){ timer = setTimeout(dismiss, 3000); });
    };

    window.addEventListener('error', function(e){
      var where = e.filename ? ' (' + e.filename.split('/').pop() + ':' + e.lineno + ')' : '';
      window.toast('A script failed to run: ' + (e.message || 'unknown error') + where, 'Page error');
    });
    window.addEventListener('unhandledrejection', function(e){
      var msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason);
      window.toast('A background request failed: ' + msg, 'Page error');
    });

    setTimeout(function(){
      var authArea = document.getElementById('authArea');
      var scriptNeverRan = typeof window.PlatformAuth === 'undefined';
      if (authArea && authArea.querySelector('.auth-skeleton') && scriptNeverRan) {
        window.toast(
          "The account system didn't finish loading in time. This usually means a script got blocked -- try disabling any ad/content blockers for this site, or test in a different browser.",
          'Still loading'
        );
      }
    }, 6000);
  })();
</script>

  const THUMB_DOWN_FILLED = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 2h3a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-3Zm-5.83 19.12L15 16.24V2H6.5a2 2 0 0 0-1.92 1.44l-2.33 8A2 2 0 0 0 4.17 14H10l-1 4.12a3.13 3.13 0 0 0 3 3.88Z"/></svg>';
  const NO_VIDEO_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 8.5l-5 3.5 5 3.5v-7Z"/><rect x="2" y="6" width="14" height="12" rx="2"/><path d="M4 4l16 16"/></svg>';

  // ================= custom YouTube player =================
  const VPlayer = (function(){
    const ICON = {
      play:   '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5.6c0-1 1.08-1.63 1.95-1.14l11.3 6.4c.9.5.9 1.78 0 2.28l-11.3 6.4c-.87.5-1.95-.13-1.95-1.14V5.6Z"/></svg>',
      pause:  '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4.5" height="14" rx="1"/><rect x="13.5" y="5" width="4.5" height="14" rx="1"/></svg>',
      volHigh:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 5V4L8 9H4Z"/><path d="M17.5 8.5a5 5 0 0 1 0 7"/><path d="M20.3 6a9 9 0 0 1 0 12"/></svg>',
      volLow: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 5V4L8 9H4Z"/><path d="M17.5 9.5a3.5 3.5 0 0 1 0 5"/></svg>',
      volMute:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 5V4L8 9H4Z"/><path d="m17 9 5 6M22 9l-5 6"/></svg>',
      fsOpen: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M8 21H5a2 2 0 0 1-2-2v-3"/></svg>',
      fsClose:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3v4a2 2 0 0 1-2 2H3M15 3v4a2 2 0 0 0 2 2h4M21 15h-4a2 2 0 0 0-2 2v4M3 15h4a2 2 0 0 1 2 2v4"/></svg>',
      xClose: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>',
      seekFwd:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 1 0 2.5-5.8"/><path d="M4 4v4h4"/></svg>',
      seekBack:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform:scaleX(-1)"><path d="M4 12a8 8 0 1 0 2.5-5.8"/><path d="M4 4v4h4"/></svg>'
    };
    const RATES = [0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2];

    let ytApiPromise = null;
    function loadYouTubeAPI(){
      if (ytApiPromise) return ytApiPromise;
      ytApiPromise = new Promise(function(resolve){
        if (window.YT && window.YT.Player) { resolve(); return; }
        const prevReady = window.onYouTubeIframeAPIReady;
        window.onYouTubeIframeAPIReady = function(){
          if (typeof prevReady === 'function') prevReady();
          resolve();
        };
        if (!document.getElementById('ytIframeApiScript')) {
          const tag = document.createElement('script');
          tag.id = 'ytIframeApiScript';
          tag.src = 'https://www.youtube.com/iframe_api';
          document.head.appendChild(tag);
        }
      });
      return ytApiPromise;
    }

    function fmtTime(sec){
      sec = Math.max(0, Math.floor(sec || 0));
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      const mm = h ? String(m).padStart(2, '0') : String(m);
      const ss = String(s).padStart(2, '0');
      return h ? (h + ':' + mm + ':' + ss) : (mm + ':' + ss);
    }

    function init(rootEl, videoId, title){
      rootEl.innerHTML =
        '<div class="vplayer-inner" id="vpInner">' +
          '<div class="vplayer-mount" id="vpMount"></div>' +
          '<div class="vplayer-hit" id="vpHit">' +
            '<div class="vplayer-hit-zone" data-zone="left"></div>' +
            '<div class="vplayer-hit-zone" data-zone="mid"></div>' +
            '<div class="vplayer-hit-zone" data-zone="right"></div>' +
          '</div>' +
          '<div class="vplayer-seekflash left" id="vpFlashLeft">' + ICON.seekBack + '<span id="vpFlashLeftLabel">10</span></div>' +
          '<div class="vplayer-seekflash right" id="vpFlashRight">' + ICON.seekFwd + '<span id="vpFlashRightLabel">10</span></div>' +
          '<div class="vplayer-center-btn" id="vpCenterBtn"></div>' +
          '<div class="vplayer-startcover" id="vpStartCover"><div class="vplayer-startcover-btn">' + ICON.play + '</div></div>' +
          '<div class="vplayer-controls" id="vpControls">' +
            '<div class="vprogress-row">' +
              '<div class="vprogress" id="vpProgress">' +
                '<div class="vprogress-track"></div>' +
                '<div class="vprogress-played" id="vpPlayed"></div>' +
                '<div class="vprogress-handle" id="vpHandle"></div>' +
              '</div>' +
            '</div>' +
            '<div class="vcontrols-row">' +
              '<div class="vcontrols-left">' +
                '<button class="vctl-btn" id="vpPlayBtn" type="button" aria-label="Play/Pause"></button>' +
                '<div class="vvolume-wrap" id="vpVolWrap">' +
                  '<button class="vctl-btn" id="vpMuteBtn" type="button" aria-label="Mute"></button>' +
                  '<input class="vvolume-slider" id="vpVolSlider" type="range" min="0" max="100" value="100">' +
                '</div>' +
                '<span class="vtime" id="vpTime">0:00 / 0:00</span>' +
              '</div>' +
              '<div class="vcontrols-right">' +
                '<div class="vspeed-wrap">' +
                  '<button class="vctl-btn vspeed-btn" id="vpSpeedBtn" type="button">1x</button>' +
                  '<div class="vspeed-menu" id="vpSpeedMenu"></div>' +
                '</div>' +
                '<button class="vctl-btn" id="vpFsBtn" type="button" aria-label="Fullscreen"></button>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="vplayer-fs-close" id="vpFsClose">' + ICON.xClose + '</div>';

      const $ = function(id){ return document.getElementById(id); };
      const els = {
        inner: $('vpInner'), mount: $('vpMount'), hit: $('vpHit'),
        flashLeft: $('vpFlashLeft'), flashRight: $('vpFlashRight'),
        flashLeftLabel: $('vpFlashLeftLabel'), flashRightLabel: $('vpFlashRightLabel'),
        centerBtn: $('vpCenterBtn'), startCover: $('vpStartCover'), controls: $('vpControls'),
        progress: $('vpProgress'), played: $('vpPlayed'), handle: $('vpHandle'),
        playBtn: $('vpPlayBtn'), volWrap: $('vpVolWrap'), muteBtn: $('vpMuteBtn'), volSlider: $('vpVolSlider'),
        time: $('vpTime'), speedBtn: $('vpSpeedBtn'), speedMenu: $('vpSpeedMenu'), fsBtn: $('vpFsBtn'), fsClose: $('vpFsClose')
      };

      els.playBtn.innerHTML = ICON.play;
      els.muteBtn.innerHTML = ICON.volHigh;
      els.fsBtn.innerHTML = ICON.fsOpen;
      els.centerBtn.innerHTML = ICON.play;
      RATES.forEach(function(r){
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'vspeed-item' + (r === 1 ? ' active' : '');
        btn.textContent = r + 'x';
        btn.setAttribute('data-rate', r);
        els.speedMenu.appendChild(btn);
      });

      let yt = null;
      let duration = 0;
      let lastVolume = 100;
      let hideTimer = null;
      let progressTimer = null;
      let draggingProgress = false;
      let isFullscreen = false;
      let overlayForceHidden = false;
      let hasStartedOnce = false;
      let pendingPlay = false;

      function showControls(persist){
        if (overlayForceHidden) return;
        els.controls.classList.add('show');
        rootEl.classList.remove('controls-hidden');
        clearTimeout(hideTimer);
        if (!persist) scheduleHide();
      }
      function toggleOverlayHidden(){
        overlayForceHidden = !overlayForceHidden;
        rootEl.classList.toggle('overlay-force-hidden', overlayForceHidden);
        if (overlayForceHidden) {
          clearTimeout(hideTimer);
          els.speedMenu.classList.remove('open');
          els.controls.classList.remove('show');
        } else {
          showControls();
        }
        return overlayForceHidden;
      }
      function scheduleHide(){
        clearTimeout(hideTimer);
        hideTimer = setTimeout(function(){
          if (!yt || rootEl.classList.contains('paused')) return;
          els.speedMenu.classList.remove('open');
          els.controls.classList.remove('show');
        }, 2200);
      }
      function setPaused(paused){
        rootEl.classList.toggle('paused', paused);
        els.playBtn.innerHTML = paused ? ICON.play : ICON.pause;
        if (paused) showControls(true); else scheduleHide();
      }

      function updateProgressUI(){
        if (!yt || draggingProgress) return;
        const cur = yt.getCurrentTime ? yt.getCurrentTime() : 0;
        duration = (yt.getDuration ? yt.getDuration() : 0) || duration;
        const pct = duration ? Math.min(100, (cur / duration) * 100) : 0;
        els.played.style.width = pct + '%';
        els.handle.style.left = pct + '%';
        els.time.textContent = fmtTime(cur) + ' / ' + fmtTime(duration);
      }
      function startProgressLoop(){
        clearInterval(progressTimer);
        progressTimer = setInterval(updateProgressUI, 250);
      }

      function flashSeek(dir, secs){
        const el = dir === 'left' ? els.flashLeft : els.flashRight;
        const label = dir === 'left' ? els.flashLeftLabel : els.flashRightLabel;
        label.textContent = secs;
        el.classList.add('show');
        clearTimeout(el._t);
        el._t = setTimeout(function(){ el.classList.remove('show'); }, 480);
      }
      function pulseCenter(icon){
        els.centerBtn.innerHTML = icon;
        els.centerBtn.classList.remove('pulse');
        void els.centerBtn.offsetWidth;
        els.centerBtn.classList.add('pulse');
      }

      function seekBy(delta){
        if (!yt) return;
        const cur = yt.getCurrentTime();
        yt.seekTo(Math.max(0, Math.min(duration, cur + delta)), true);
        showControls();
      }
      function hideStartCover(){
        if (hasStartedOnce) return;
        hasStartedOnce = true;
        if (els.startCover) els.startCover.classList.add('hide');
      }
      if (els.startCover) {
        els.startCover.addEventListener('click', function(e){
          e.stopPropagation();
          hideStartCover();
          if (yt) { yt.playVideo(); } else { pendingPlay = true; }
        });
      }
      function togglePlay(){
        if (!yt) return;
        const st = yt.getPlayerState();
        if (st === 1 || st === 3) { yt.pauseVideo(); pulseCenter(ICON.pause); }
        else { yt.playVideo(); pulseCenter(ICON.play); }
      }
      function updateVolIcon(){
        const muted = yt.isMuted();
        const vol = yt.getVolume();
        els.muteBtn.innerHTML = muted || vol === 0 ? ICON.volMute : (vol < 45 ? ICON.volLow : ICON.volHigh);
        els.volSlider.value = muted ? 0 : vol;
      }
      function setSpeed(rate){
        yt.setPlaybackRate(rate);
        els.speedBtn.textContent = rate + 'x';
        els.speedMenu.querySelectorAll('.vspeed-item').forEach(function(b){
          b.classList.toggle('active', parseFloat(b.getAttribute('data-rate')) === rate);
        });
      }

      // ---- orientation-aware custom fullscreen ----
      function applyOrientationClass(){
        const portrait = window.matchMedia('(orientation: portrait)').matches;
        rootEl.classList.toggle('is-portrait', portrait);
      }
      function enterFullscreen(){
        isFullscreen = true;
        rootEl.classList.add('is-fullscreen');
        document.body.classList.add('vfs-lock');
        applyOrientationClass();
        window.addEventListener('resize', applyOrientationClass);
        window.addEventListener('orientationchange', applyOrientationClass);
        els.fsBtn.innerHTML = ICON.fsClose;
        showControls();
      }
      function exitFullscreen(){
        isFullscreen = false;
        rootEl.classList.remove('is-fullscreen', 'is-portrait');
        document.body.classList.remove('vfs-lock');
        window.removeEventListener('resize', applyOrientationClass);
        window.removeEventListener('orientationchange', applyOrientationClass);
        els.fsBtn.innerHTML = ICON.fsOpen;
      }
      function toggleFullscreen(){ isFullscreen ? exitFullscreen() : enterFullscreen(); }

      // ---- progress bar scrub (mouse + touch via Pointer Events) ----
      function pctFromEvent(e){
        const rect = els.progress.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        return Math.max(0, Math.min(1, x / rect.width));
      }
      els.progress.addEventListener('pointerdown', function(e){
        draggingProgress = true;
        els.progress.classList.add('dragging');
        showControls(true);
        const p = pctFromEvent(e);
        els.played.style.width = (p * 100) + '%';
        els.handle.style.left = (p * 100) + '%';
        els.progress.setPointerCapture(e.pointerId);
      });
      els.progress.addEventListener('pointermove', function(e){
        if (!draggingProgress) return;
        const p = pctFromEvent(e);
        els.played.style.width = (p * 100) + '%';
        els.handle.style.left = (p * 100) + '%';
        els.time.textContent = fmtTime(p * duration) + ' / ' + fmtTime(duration);
      });
      function endDrag(e){
        if (!draggingProgress) return;
        draggingProgress = false;
        els.progress.classList.remove('dragging');
        const p = pctFromEvent(e);
        yt.seekTo(p * duration, true);
        scheduleHide();
      }
      els.progress.addEventListener('pointerup', endDrag);
      els.progress.addEventListener('pointercancel', endDrag);

      // ---- volume slider ----
      els.volSlider.addEventListener('input', function(){
        const v = parseInt(els.volSlider.value, 10);
        if (v === 0) { yt.mute(); } else { if (yt.isMuted()) yt.unmute(); yt.setVolume(v); lastVolume = v; }
        updateVolIcon();
      });
      els.muteBtn.addEventListener('click', function(e){
        e.stopPropagation();
        if (yt.isMuted() || yt.getVolume() === 0) { yt.unmute(); yt.setVolume(lastVolume || 100); }
        else { lastVolume = yt.getVolume(); yt.mute(); }
        updateVolIcon();
        showControls();
      });

      // ---- play / speed / fullscreen / close buttons ----
      els.playBtn.addEventListener('click', function(e){ e.stopPropagation(); togglePlay(); });
      els.speedBtn.addEventListener('click', function(e){ e.stopPropagation(); els.speedMenu.classList.toggle('open'); showControls(true); });
      els.speedMenu.addEventListener('click', function(e){
        const item = e.target.closest('.vspeed-item');
        if (!item) return;
        setSpeed(parseFloat(item.getAttribute('data-rate')));
        els.speedMenu.classList.remove('open');
      });
      els.fsBtn.addEventListener('click', function(e){ e.stopPropagation(); toggleFullscreen(); });
      els.fsClose.addEventListener('click', function(e){ e.stopPropagation(); exitFullscreen(); });
      document.addEventListener('click', function(e){
        if (!e.target.closest('.vspeed-wrap')) els.speedMenu.classList.remove('open');
        if (!rootEl.contains(e.target)) hideControlsNow();
      });

      // ---- tap / click zones: single tap toggles controls, double tap seeks (sides) or play/pause (middle) ----
      let tapTimers = {};
      function onZoneActivate(zone, isDouble){
        if (zone === 'mid') {
          if (isDouble) togglePlay(); else { rootEl.classList.contains('paused') || els.controls.classList.contains('show') ? hideControlsNow() : showControls(); }
        } else if (zone === 'left') {
          if (isDouble) { seekBy(-10); flashSeek('left', 10); } else { toggleControlsVisible(); }
        } else if (zone === 'right') {
          if (isDouble) { seekBy(10); flashSeek('right', 10); } else { toggleControlsVisible(); }
        }
      }
      function toggleControlsVisible(){
        if (els.controls.classList.contains('show')) hideControlsNow();
        else showControls();
      }
      function hideControlsNow(){
        if (rootEl.classList.contains('paused')) return;
        els.speedMenu.classList.remove('open');
        els.controls.classList.remove('show');
        clearTimeout(hideTimer);
      }
      els.hit.querySelectorAll('.vplayer-hit-zone').forEach(function(zoneEl){
        const zone = zoneEl.getAttribute('data-zone');
        zoneEl.addEventListener('click', function(){
          if (tapTimers[zone]) {
            clearTimeout(tapTimers[zone]);
            tapTimers[zone] = null;
            onZoneActivate(zone, true);
          } else {
            tapTimers[zone] = setTimeout(function(){
              tapTimers[zone] = null;
              onZoneActivate(zone, false);
            }, 260);
          }
        });
      });

      // desktop: show controls on mouse movement, hide shortly after leaving
      rootEl.addEventListener('mousemove', function(){ showControls(); });
      rootEl.addEventListener('mouseleave', function(){ if (!rootEl.classList.contains('paused')) hideControlsNow(); });

      // ---- keyboard shortcuts: bound to document so they work immediately,
      // no need to click the video first (iframe has pointer-events:none so
      // it can never steal focus in the first place) ----
      function isTypingTarget(){
        const a = document.activeElement;
        if (!a) return false;
        const tag = a.tagName;
        return tag === 'INPUT' || tag === 'TEXTAREA' || a.isContentEditable;
      }
      function onKeydown(e){
        if (!yt || isTypingTarget()) return;
        if (!document.body.contains(rootEl)) return;
        switch (e.key) {
          case ' ': case 'k': case 'K': e.preventDefault(); togglePlay(); break;
          case 'ArrowLeft': e.preventDefault(); seekBy(-5); flashSeek('left', 5); break;
          case 'ArrowRight': e.preventDefault(); seekBy(5); flashSeek('right', 5); break;
          case 'j': case 'J': seekBy(-10); flashSeek('left', 10); break;
          case 'l': case 'L': seekBy(10); flashSeek('right', 10); break;
          case 'ArrowUp': e.preventDefault(); yt.setVolume(Math.min(100, yt.getVolume() + 5)); if (yt.isMuted()) yt.unmute(); updateVolIcon(); showControls(); break;
          case 'ArrowDown': e.preventDefault(); yt.setVolume(Math.max(0, yt.getVolume() - 5)); updateVolIcon(); showControls(); break;
          case 'm': case 'M': els.muteBtn.click(); break;
          case 'f': case 'F': toggleFullscreen(); break;
          case 'Escape': if (isFullscreen) exitFullscreen(); break;
          default:
            if (e.key >= '0' && e.key <= '9') { yt.seekTo(duration * (parseInt(e.key, 10) / 10), true); }
        }
      }
      document.addEventListener('keydown', onKeydown);

      // ---- build the actual YT player ----
      const mountId = 'ytmount_' + Math.random().toString(36).slice(2);
      els.mount.id = mountId;

      loadYouTubeAPI().then(function(){
        yt = new YT.Player(mountId, {
          videoId: videoId,
          playerVars: { autoplay: 1, rel: 0, modestbranding: 1, controls: 0, disablekb: 1, playsinline: 1, iv_load_policy: 3, fs: 0 },
          events: {
            onReady: function(){
              updateVolIcon();
              startProgressLoop();
              setPaused(false);
              if (pendingPlay) { pendingPlay = false; yt.playVideo(); }
            },
            onStateChange: function(ev){
              if (ev.data === YT.PlayerState.PLAYING) { setPaused(false); hideStartCover(); }
              else if (ev.data === YT.PlayerState.PAUSED) { setPaused(true); }
              else if (ev.data === YT.PlayerState.ENDED) { setPaused(true); }
            },
            onError: function(){
              window.toast('This video could not be played (it may be restricted or removed on YouTube).', 'Playback error');
            }
          }
        });
      });

      return {
        destroy: function(){ document.removeEventListener('keydown', onKeydown); clearInterval(progressTimer); },
        toggleOverlayHidden: toggleOverlayHidden
      };
    }

    return { init: init };
  })();

  const authArea = document.getElementById('authArea');
  PlatformAuth.renderHeader(authArea);
  const session = PlatformAuth.getSession();
  if (session) {
    PlatformAuth.enforceFirstTimeGate();
    PlatformAuth.startAutoSync();
  }

  // ---------- WHICH video is this? ----------
  // /watch/dQw4w9WgXcQ  -- Cloudflare rewrites this to /watch/?v=dQw4w9WgXcQ
  //                        (see _redirects), so check the query param first.
  // /watch/dQw4w9WgXcQ  -- also handle a raw, un-rewritten path as a fallback.

  function videoIdFromQuery(){
    var params = new URLSearchParams(window.location.search);
    var v = params.get('v');
    return v ? decodeURIComponent(v) : null;
  }
  function videoIdFromPath(){
    var path = window.location.pathname.replace(/\/+$/, '');
    var match = path.match(/\/watch\/([^\/]+)/i);
    return match ? decodeURIComponent(match[1]) : null;
  }
  const routeVideoId = videoIdFromQuery() || videoIdFromPath();

  function buildSideSkeleton(){
    var side = document.getElementById('watchSide');
    var card = function(){
      return '<div class="side-card-sk">' +
        '<div class="side-thumb-sk sk"></div>' +
        '<div class="side-lines-sk">' +
          '<div class="side-line-sk w90 sk"></div>' +
          '<div class="side-line-sk w60 sk"></div>' +
          '<div class="side-line-sk w40 sk"></div>' +
        '</div>' +
      '</div>';
    };
    side.innerHTML = Array.from({ length: 8 }).map(card).join('');
  }
  buildSideSkeleton();

  function makeFollowBtn(username, initiallyFollowing){
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'vfollow-btn';
    var following = !!initiallyFollowing;
    function paint(){
      btn.classList.toggle('is-following', following);
      btn.textContent = following ? 'Following' : 'Follow';
    }
    paint();
    btn.addEventListener('click', function(){
      if (!PlatformAuth.getSession()) { window.location.href = '/join'; return; }
      btn.disabled = true;
      PlatformAuth.toggleFollow(username)
        .then(function(res){
          following = !!res.following;
          paint();
        })
        .catch(function(err){ window.toast(err.message || 'Could not update follow status.', 'Error'); })
        .finally(function(){ btn.disabled = false; });
    });
    return btn;
  }

  // Freezes shimmer on whatever skeleton pieces are still showing once we
  // know their real state isn't coming (video 404) -- a looping shimmer
  // implies "still loading", which would be misleading here.
  function freezeSkeleton(root){
    root.querySelectorAll('.sk').forEach(function(el){ el.classList.add('frozen'); });
  }

  function showPlayer404(){
    var player = document.getElementById('watchPlayer');
    player.classList.remove('sk');
    player.innerHTML =
      '<div class="vplayer-404">' +
        '<div class="vplayer-404-icon">' + NO_VIDEO_SVG + '</div>' +
        '<div class="vplayer-404-title">Not on Platform</div>' +
        '<div class="vplayer-404-sub">This video hasn\'t been synced from a creator here yet.</div>' +
      '</div>';

    var titleEl = document.getElementById('watchTitle');
    titleEl.classList.remove('sk');
    titleEl.style.display = 'none';

    // Channel row + reaction pill stay exactly as they already are (loading
    // skeleton / disabled) -- freeze them so they read as "unavailable"
    // rather than "still loading".
    freezeSkeleton(document.getElementById('watchChannel'));
    document.getElementById('watchReactPill').classList.add('disabled');
  }

  function loadWatchView(videoId){
    var player = document.getElementById('watchPlayer');
    var titleEl = document.getElementById('watchTitle');
    var channelAvatarSk = document.getElementById('watchChannelAvatarSk');
    var channelAvatarImg = document.getElementById('watchChannelAvatarImg');
    var channelMetaSk = document.getElementById('watchChannelMetaSk');
    var channelMetaReal = document.getElementById('watchChannelMetaReal');
    var channelName = document.getElementById('watchChannelName');
    var channelHandle = document.getElementById('watchChannelHandle');
    var channelEl = document.getElementById('watchChannel');
    var followSlot = document.getElementById('watchFollowSlot');
    var reactPill = document.getElementById('watchReactPill');
    var likeBtn = document.getElementById('watchLikeBtn');
    var dislikeBtn = document.getElementById('watchDislikeBtn');
    var likeIcon = document.getElementById('watchLikeIcon');
    var dislikeIcon = document.getElementById('watchDislikeIcon');
    var likeCount = document.getElementById('watchLikeCount');

    PlatformAuth.getVideoByID(videoId).then(function(data){
      var v = data.video;
      var user = data.user;

      player.classList.remove('sk');
      if (window.__vplayerInstance) window.__vplayerInstance.destroy();
      window.__vplayerInstance = VPlayer.init(player, v.video_id, v.title || '');

      var overlayToggleBtn = document.getElementById('watchOverlayToggleBtn');
      if (overlayToggleBtn) {
        overlayToggleBtn.textContent = 'Hide overlay';
        overlayToggleBtn.onclick = function(){
          if (!window.__vplayerInstance) return;
          var hidden = window.__vplayerInstance.toggleOverlayHidden();
          overlayToggleBtn.textContent = hidden ? 'Show overlay' : 'Hide overlay';
        };
      }

      document.title = (v.title || 'Watch') + ' — Platform';
      titleEl.classList.remove('sk');
      titleEl.style.width = 'auto';
      titleEl.textContent = v.title || '';

      channelAvatarSk.style.display = 'none';
      channelAvatarImg.style.display = 'block';
      channelAvatarImg.src = user.pfp || DEFAULT_AVATAR;
      channelMetaSk.style.display = 'none';
      channelMetaReal.style.display = 'flex';
      channelName.textContent = (data.channel && data.channel.title) ? data.channel.title : ('@' + user.username);
      channelHandle.textContent = '@' + user.username;
      channelEl.setAttribute('href', '/profile/@' + encodeURIComponent(user.username));
      channelEl.style.cursor = 'pointer';

      if (!data.isSelf && PlatformAuth.getSession()) {
        followSlot.appendChild(makeFollowBtn(user.username, data.isFollowing));
      }

      reactPill.classList.remove('disabled');
      likeBtn.disabled = false;
      dislikeBtn.disabled = false;

      function setActive(which){
        likeBtn.classList.toggle('active', which === 'like');
        dislikeBtn.classList.toggle('active', which === 'dislike');
        likeIcon.innerHTML = which === 'like' ? THUMB_UP_FILLED : THUMB_UP_OUTLINE;
        dislikeIcon.innerHTML = which === 'dislike' ? THUMB_DOWN_FILLED : THUMB_DOWN_OUTLINE;
        likeCount.textContent = v.like_count || 0;
      }
      setActive(data.myReaction);

      [likeBtn, dislikeBtn].forEach(function(btn){
        btn.addEventListener('click', function(){
          if (!PlatformAuth.getSession()) { window.location.href = '/join'; return; }
          var reaction = btn.getAttribute('data-reaction');
          PlatformAuth.toggleVideoReaction(v.id, reaction)
            .then(function(res){
              v.like_count = res.like_count;
              v.dislike_count = res.dislike_count;
              setActive(res.reaction || null);
            })
            .catch(function(err){ window.toast(err.message || 'Could not react to this video.', 'Error'); });
        });
      });
    }).catch(function(){
      // Video id doesn't resolve to anything in creators_videos -- keep the
      // rest of the page intact, just replace the player with a minimal
      // "not on Platform" state.
      showPlayer404();
    });
  }

  document.getElementById('watchChannel').addEventListener('click', function(){
    var href = this.getAttribute('href');
    if (href) window.location.href = href;
  });

  if (!routeVideoId) {
    showPlayer404();
  } else {
    loadWatchView(routeVideoId);
  }
</script>

</body>
</html>
